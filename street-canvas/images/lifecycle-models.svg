<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e67e22"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2980b9"/>
    </marker>
    <marker id="arrH" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8e44ad"/>
    </marker>
    <linearGradient id="art1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e74c8b"/><stop offset="1" stop-color="#f39c12"/>
    </linearGradient>
    <linearGradient id="art2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12c2e9"/><stop offset="1" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="art3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9b59b6"/><stop offset="1" stop-color="#e74c8b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="820" fill="#fbfaf7"/>
  <text x="600" y="44" text-anchor="middle" font-size="25" font-weight="bold" fill="#333">作品ライフサイクル — 2つの設計思想とハイブリッド解</text>

  <!-- ========== 方向A: エフェメラル ========== -->
  <g>
    <rect x="30" y="80" width="555" height="380" rx="16" fill="#fff" stroke="#e67e22" stroke-width="3"/>
    <rect x="30" y="80" width="555" height="52" rx="16" fill="#e67e22"/>
    <text x="307" y="106" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">方向A：エフェメラルモデル</text>
    <text x="307" y="124" text-anchor="middle" font-size="12" fill="#fff">評価が作品を生かす — 注目されない絵は退色し、消えていく</text>

    <!-- 退色3段階 -->
    <g>
      <!-- 段階1: 鮮明 -->
      <rect x="65" y="165" width="130" height="100" fill="#f7f3ee" stroke="#bbb" stroke-width="2"/>
      <path d="M 85 240 Q 105 180 130 230 Q 148 190 172 236" fill="none" stroke="url(#art1)" stroke-width="9" stroke-linecap="round"/>
      <text x="130" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">鮮明</text>
      <text x="130" y="305" text-anchor="middle" font-size="11" fill="#666">インク量 100%</text>

      <line x1="203" y1="215" x2="235" y2="215" stroke="#e67e22" stroke-width="3" marker-end="url(#arrA)"/>
      <text x="219" y="200" text-anchor="middle" font-size="10" fill="#e67e22">時間経過</text>

      <!-- 段階2: 退色 -->
      <rect x="243" y="165" width="130" height="100" fill="#f7f3ee" stroke="#bbb" stroke-width="2"/>
      <path d="M 263 240 Q 283 180 308 230 Q 326 190 350 236" fill="none" stroke="url(#art1)" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
      <text x="308" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">退色</text>
      <text x="308" y="305" text-anchor="middle" font-size="11" fill="#666">インク量 40%</text>

      <line x1="381" y1="215" x2="413" y2="215" stroke="#e67e22" stroke-width="3" marker-end="url(#arrA)"/>

      <!-- 段階3: 消滅→開放 -->
      <rect x="421" y="165" width="130" height="100" fill="#f7f3ee" stroke="#bbb" stroke-width="2"/>
      <path d="M 441 240 Q 461 180 486 230 Q 504 190 528 236" fill="none" stroke="#ccc" stroke-width="9" stroke-linecap="round" opacity="0.25" stroke-dasharray="2 8"/>
      <text x="486" y="222" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">上書きOK!</text>
      <text x="486" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">消滅 → 開放</text>
      <text x="486" y="305" text-anchor="middle" font-size="11" fill="#666">新しいキャンバスに</text>
    </g>

    <!-- 注目度で回復 -->
    <path d="M 308 158 Q 220 130 138 158" fill="none" stroke="#27ae60" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrB)"/>
    <rect x="100" y="134" width="248" height="19" rx="9" fill="#ffffff" opacity="0.92"/>
    <text x="223" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">注目されるとインク量が回復（生き続ける）</text>

    <!-- キーワード -->
    <g font-size="12">
      <rect x="65" y="330" width="115" height="30" rx="15" fill="#fdf1e3"/>
      <text x="122" y="349" text-anchor="middle" fill="#b9650f">新陳代謝</text>
      <rect x="190" y="330" width="150" height="30" rx="15" fill="#fdf1e3"/>
      <text x="265" y="349" text-anchor="middle" fill="#b9650f">新規参入のチャンス</text>
      <rect x="350" y="330" width="180" height="30" rx="15" fill="#fdf1e3"/>
      <text x="440" y="349" text-anchor="middle" fill="#b9650f">ゲーム性（陣取り・シーズン）</text>
    </g>
    <text x="65" y="395" font-size="12" fill="#27ae60">◎ 常に新しい街 / リアルの儚さの再現 / 運用負荷が一定</text>
    <text x="65" y="418" font-size="12" fill="#c0392b">△ 力作が消える喪失感 / アーカイブ性ゼロ / 悪意の上書き対策が必要</text>
    <text x="65" y="445" font-size="12" font-weight="bold" fill="#333">→ 向かう先：ゲーム・競争による「街の活性化」</text>
  </g>

  <!-- ========== 方向B: パリンプセスト ========== -->
  <g>
    <rect x="615" y="80" width="555" height="380" rx="16" fill="#fff" stroke="#2980b9" stroke-width="3"/>
    <rect x="615" y="80" width="555" height="52" rx="16" fill="#2980b9"/>
    <text x="892" y="106" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">方向B：パリンプセストモデル</text>
    <text x="892" y="124" text-anchor="middle" font-size="12" fill="#fff">あえて消さない — 上書きは破壊ではなく、歴史の追加</text>

    <!-- 地層断面 -->
    <g>
      <text x="745" y="162" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">壁の「地層」断面ビュー</text>
      <!-- 最上層 -->
      <rect x="650" y="175" width="190" height="52" fill="#f7f3ee" stroke="#999" stroke-width="2"/>
      <path d="M 668 216 Q 685 182 705 210 Q 720 188 740 213" fill="none" stroke="url(#art3)" stroke-width="7" stroke-linecap="round"/>
      <text x="852" y="205" font-size="12" fill="#333">2026「桜のミューラル」</text>
      <!-- 層2 -->
      <rect x="658" y="235" width="190" height="52" fill="#efe9e0" stroke="#999" stroke-width="2"/>
      <path d="M 676 276 Q 693 242 713 270 Q 728 248 748 273" fill="none" stroke="url(#art2)" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
      <text x="860" y="265" font-size="12" fill="#555">2025「クジラの壁画」</text>
      <!-- 層3 -->
      <rect x="666" y="295" width="190" height="52" fill="#e7e0d4" stroke="#999" stroke-width="2"/>
      <path d="M 684 336 Q 701 302 721 330 Q 736 308 756 333" fill="none" stroke="url(#art1)" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
      <text x="868" y="325" font-size="12" fill="#777">2024「最初の一筆」</text>
      <text x="758" y="372" text-anchor="middle" font-size="11" fill="#666">下の層は隠れるが、消えない</text>
    </g>

    <!-- タイムスライダー -->
    <g>
      <text x="1075" y="162" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">タイムスライダー</text>
      <line x1="1010" y1="220" x2="1140" y2="220" stroke="#999" stroke-width="4" stroke-linecap="round"/>
      <circle cx="1058" cy="220" r="10" fill="#2980b9"/>
      <text x="1010" y="245" font-size="10" fill="#666">2024</text>
      <text x="1122" y="245" font-size="10" fill="#666">現在</text>
      <text x="1075" y="272" text-anchor="middle" font-size="11" fill="#2980b9" font-weight="bold">壁の歴史を旅する</text>
      <!-- 解体建物 -->
      <g>
        <rect x="1030" y="292" width="46" height="56" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="5 3"/>
        <text x="1053" y="326" text-anchor="middle" font-size="10" fill="#999">解体済</text>
        <path d="M 1086 320 L 1112 320" stroke="#2980b9" stroke-width="2.5" marker-end="url(#arrB)"/>
        <rect x="1118" y="292" width="30" height="56" fill="#c9b8a0" stroke="#2980b9" stroke-width="2"/>
        <text x="1075" y="368" text-anchor="middle" font-size="11" fill="#555">解体された建物にも</text>
        <text x="1075" y="383" text-anchor="middle" font-size="11" fill="#555">デジタルで会いに行ける</text>
      </g>
    </g>

    <!-- キーワード -->
    <g font-size="12">
      <rect x="650" y="400" width="115" height="30" rx="15" fill="#e3eefd"/>
      <text x="707" y="419" text-anchor="middle" fill="#1a5c96">都市の記憶</text>
      <rect x="775" y="400" width="170" height="30" rx="15" fill="#e3eefd"/>
      <text x="860" y="419" text-anchor="middle" fill="#1a5c96">解体建物への寄せ書き</text>
      <rect x="955" y="400" width="160" height="30" rx="15" fill="#e3eefd"/>
      <text x="1035" y="419" text-anchor="middle" fill="#1a5c96">文化アーカイブ・研究</text>
    </g>
    <text x="650" y="448" font-size="12" fill="#27ae60">◎ 喪失感ゼロで力作を投稿できる / 情緒的訴求力が最強</text>
  </g>

  <!-- 合流矢印 -->
  <path d="M 307 470 L 307 520 L 560 545" fill="none" stroke="#8e44ad" stroke-width="3" marker-end="url(#arrH)"/>
  <path d="M 892 470 L 892 520 L 640 545" fill="none" stroke="#8e44ad" stroke-width="3" marker-end="url(#arrH)"/>

  <!-- ========== ハイブリッド ========== -->
  <g>
    <rect x="150" y="550" width="900" height="240" rx="16" fill="#fff" stroke="#8e44ad" stroke-width="4"/>
    <rect x="150" y="550" width="900" height="54" rx="16" fill="#8e44ad"/>
    <text x="600" y="576" text-anchor="middle" font-size="19" font-weight="bold" fill="#fff">推奨：ハイブリッド「表は生態系、裏は地層」</text>
    <text x="600" y="595" text-anchor="middle" font-size="12" fill="#fff">「消える」は表示から退場するだけで、歴史からは消えない</text>

    <!-- 表示レイヤー -->
    <rect x="185" y="625" width="620" height="60" rx="10" fill="#fdf1e3" stroke="#e67e22" stroke-width="2"/>
    <text x="205" y="650" font-size="14" font-weight="bold" fill="#b9650f">表示レイヤー（街の「いま」）＝ エフェメラル</text>
    <text x="205" y="672" font-size="12" fill="#8a5210">退色・上書き・新陳代謝 — 注目度が作品を生かす生態系。ゲーム化への拡張もここに乗る</text>

    <rect x="185" y="700" width="620" height="60" rx="10" fill="#e3eefd" stroke="#2980b9" stroke-width="2"/>
    <text x="205" y="725" font-size="14" font-weight="bold" fill="#1a5c96">アーカイブレイヤー（街の「記憶」）＝ パリンプセスト</text>
    <text x="205" y="747" font-size="12" fill="#174d7c">全作品・全履歴を永続保存 — タイムスライダー / 地層ビュー / 解体建物の寄せ書き</text>

    <!-- 退避の矢印 -->
    <path d="M 830 655 Q 870 655 870 692 Q 870 728 832 728" fill="none" stroke="#8e44ad" stroke-width="3" stroke-dasharray="7 4" marker-end="url(#arrH)"/>
    <text x="945" y="682" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">表示から消えた作品は</text>
    <text x="945" y="700" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">地層へ退避（消えない）</text>
    <text x="945" y="730" text-anchor="middle" font-size="11" fill="#666">儚さ × 永続性の両立は</text>
    <text x="945" y="746" text-anchor="middle" font-size="11" fill="#666">デジタル都市だから可能</text>
  </g>
</svg>
