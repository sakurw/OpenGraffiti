<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c8b"/>
    </marker>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4eefb"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="artGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e74c8b"/>
      <stop offset="0.5" stop-color="#f39c12"/>
      <stop offset="1" stop-color="#12c2e9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="680" fill="url(#night)"/>
  <text x="600" y="46" text-anchor="middle" font-size="26" font-weight="bold" fill="#4a1a6e">PLATEAU Street Canvas — 街の壁がキャンバスになる</text>

  <!-- ① 壁を選ぶ -->
  <g>
    <rect x="30" y="90" width="270" height="270" rx="14" fill="#fff" stroke="#4a1a6e" stroke-width="2"/>
    <rect x="30" y="90" width="270" height="42" rx="14" fill="#4a1a6e"/>
    <text x="165" y="118" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">① 3D都市ビューで壁を選ぶ</text>
    <!-- アイソメ風ビル群 -->
    <g>
      <!-- ビル1 -->
      <path d="M 70 200 L 70 300 L 110 315 L 110 215 Z" fill="#b9c8dc"/>
      <path d="M 110 215 L 110 315 L 140 300 L 140 200 Z" fill="#93a9c4"/>
      <path d="M 70 200 L 110 215 L 140 200 L 100 186 Z" fill="#d5dfec"/>
      <!-- ビル2（選択壁面ハイライト） -->
      <path d="M 160 180 L 160 310 L 210 328 L 210 198 Z" fill="#b9c8dc"/>
      <path d="M 210 198 L 210 328 L 250 310 L 250 180 Z" fill="#e74c8b" opacity="0.75">
        <animate attributeName="opacity" values="0.75;0.35;0.75" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M 160 180 L 210 198 L 250 180 L 200 163 Z" fill="#d5dfec"/>
      <text x="255" y="255" font-size="11" font-weight="bold" fill="#e74c8b">公認</text>
      <text x="255" y="269" font-size="11" font-weight="bold" fill="#e74c8b">キャンバス</text>
    </g>
    <text x="165" y="348" text-anchor="middle" font-size="12" fill="#666">描けるのは公認壁面のみ（権利問題を回避）</text>
  </g>

  <line x1="308" y1="225" x2="352" y2="225" stroke="#e74c8b" stroke-width="3" marker-end="url(#arrow2)"/>
  <text x="330" y="210" text-anchor="middle" font-size="11" fill="#e74c8b" font-weight="bold">UV展開</text>

  <!-- ② 描く -->
  <g>
    <rect x="360" y="90" width="270" height="270" rx="14" fill="#fff" stroke="#4a1a6e" stroke-width="2"/>
    <rect x="360" y="90" width="270" height="42" rx="14" fill="#4a1a6e"/>
    <text x="495" y="118" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">② 2Dキャンバスに描く</text>
    <!-- 展開された壁面 -->
    <rect x="395" y="155" width="170" height="130" fill="#f7f3ee" stroke="#999" stroke-width="2" stroke-dasharray="6 4"/>
    <!-- 落書きアート -->
    <path d="M 420 240 Q 445 180 470 235 Q 490 190 515 238" fill="none" stroke="url(#artGrad)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="530" cy="185" r="14" fill="#f39c12"/>
    <path d="M 530 171 L 534 181 L 545 181 L 536 188 L 540 199 L 530 192 L 520 199 L 524 188 L 515 181 L 526 181 Z" fill="#fff" transform="scale(0.9) translate(59 22)"/>
    <!-- スプレー缶 -->
    <rect x="575" y="230" width="22" height="46" rx="5" fill="#e74c8b"/>
    <rect x="580" y="220" width="12" height="10" fill="#888"/>
    <circle cx="586" cy="216" r="3" fill="#555"/>
    <g fill="#e74c8b" opacity="0.5">
      <circle cx="570" cy="205" r="2.5"/><circle cx="562" cy="198" r="2"/><circle cx="572" cy="193" r="1.8"/>
    </g>
    <text x="495" y="312" text-anchor="middle" font-size="12" fill="#666">壁面をUV展開した2D画面に</text>
    <text x="495" y="330" text-anchor="middle" font-size="12" fill="#666">スプレー・ブラシ・レイヤーで描画</text>
    <text x="495" y="348" text-anchor="middle" font-size="11" fill="#9b59b6" font-weight="bold">AIアシストで誰でも描ける（ラフ→スタイル仕上げ）</text>
  </g>

  <line x1="638" y1="225" x2="682" y2="225" stroke="#e74c8b" stroke-width="3" marker-end="url(#arrow2)"/>
  <text x="660" y="210" text-anchor="middle" font-size="11" fill="#e74c8b" font-weight="bold">再投影</text>

  <!-- ③ 街に公開 -->
  <g>
    <rect x="690" y="90" width="230" height="270" rx="14" fill="#fff" stroke="#4a1a6e" stroke-width="2"/>
    <rect x="690" y="90" width="230" height="42" rx="14" fill="#4a1a6e"/>
    <text x="805" y="118" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">③ 街に公開される</text>
    <!-- ビルに絵が貼られる -->
    <path d="M 730 175 L 730 305 L 780 323 L 780 193 Z" fill="#b9c8dc"/>
    <path d="M 780 193 L 780 323 L 825 305 L 825 175 Z" fill="#f7f3ee"/>
    <!-- 壁の上のアート -->
    <g transform="translate(783 210) scale(0.55) rotate(4)">
      <path d="M 10 60 Q 30 10 55 55 Q 72 18 92 58" fill="none" stroke="url(#artGrad)" stroke-width="12" stroke-linecap="round"/>
    </g>
    <path d="M 730 175 L 780 193 L 825 175 L 775 158 Z" fill="#d5dfec"/>
    <!-- モデレーションバッジ -->
    <circle cx="875" cy="200" r="20" fill="#27ae60"/>
    <path d="M 866 200 L 872 207 L 885 192" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
    <text x="875" y="234" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">AI審査</text>
    <text x="875" y="247" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">通過</text>
    <text x="805" y="342" text-anchor="middle" font-size="12" fill="#666">全ユーザーの3Dビューに即反映</text>
  </g>

  <line x1="928" y1="225" x2="972" y2="225" stroke="#e74c8b" stroke-width="3" marker-end="url(#arrow2)"/>

  <!-- ④ AR鑑賞 -->
  <g>
    <rect x="980" y="90" width="190" height="270" rx="14" fill="#fff" stroke="#4a1a6e" stroke-width="2"/>
    <rect x="980" y="90" width="190" height="42" rx="14" fill="#4a1a6e"/>
    <text x="1075" y="118" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">④ 現地ARで鑑賞</text>
    <!-- スマホ -->
    <rect x="1030" y="150" width="90" height="165" rx="12" fill="#333"/>
    <rect x="1038" y="162" width="74" height="130" rx="4" fill="#cfe3f5"/>
    <!-- スマホ内の実風景+アート -->
    <rect x="1038" y="230" width="74" height="62" fill="#8fa8be"/>
    <rect x="1050" y="185" width="50" height="75" fill="#e8e0d5"/>
    <g transform="translate(1053 205) scale(0.42)">
      <path d="M 10 60 Q 30 10 55 55 Q 72 18 92 58" fill="none" stroke="url(#artGrad)" stroke-width="14" stroke-linecap="round"/>
    </g>
    <circle cx="1075" cy="304" r="7" fill="#555"/>
    <text x="1075" y="340" text-anchor="middle" font-size="12" fill="#666">実物大で壁に出現</text>
    <text x="1075" y="356" text-anchor="middle" font-size="11" fill="#e74c8b" font-weight="bold">現地鑑賞は注目度の重み最大</text>
  </g>

  <!-- 下部: 注目度と人流 -->
  <g>
    <rect x="30" y="400" width="1140" height="250" rx="14" fill="#fff" stroke="#4a1a6e" stroke-width="2"/>
    <rect x="30" y="400" width="1140" height="40" rx="14" fill="#e74c8b"/>
    <text x="600" y="427" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">⑤ 注目度が作品のライフサイクルを駆動 → アートが人流をつくる</text>

    <!-- 注目度メーター -->
    <g>
      <text x="200" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a1a6e">注目度スコア</text>
      <text x="90" y="505" font-size="12" fill="#333">Web閲覧</text>
      <rect x="170" y="494" width="60" height="13" rx="4" fill="#c8b6e2"/>
      <text x="238" y="505" font-size="11" fill="#666">×1</text>
      <text x="90" y="533" font-size="12" fill="#333">いいね</text>
      <rect x="170" y="522" width="110" height="13" rx="4" fill="#9b59b6"/>
      <text x="288" y="533" font-size="11" fill="#666">×5</text>
      <text x="90" y="561" font-size="12" fill="#333">現地AR鑑賞</text>
      <rect x="170" y="550" width="180" height="13" rx="4" fill="#e74c8b"/>
      <text x="358" y="561" font-size="11" fill="#e74c8b" font-weight="bold">×20</text>
      <text x="200" y="595" text-anchor="middle" font-size="11" fill="#666">「見に行く」ほど作品が輝く設計</text>
    </g>

    <!-- 人流ループ -->
    <g>
      <text x="640" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a1a6e">人流創出のループ</text>
      <rect x="460" y="495" width="110" height="52" rx="26" fill="#fdeef5" stroke="#e74c8b"/>
      <text x="515" y="517" text-anchor="middle" font-size="12" fill="#4a1a6e">良い作品が</text>
      <text x="515" y="533" text-anchor="middle" font-size="12" fill="#4a1a6e">生まれる</text>
      <line x1="574" y1="521" x2="608" y2="521" stroke="#e74c8b" stroke-width="2.5" marker-end="url(#arrow2)"/>
      <rect x="612" y="495" width="110" height="52" rx="26" fill="#fdeef5" stroke="#e74c8b"/>
      <text x="667" y="517" text-anchor="middle" font-size="12" fill="#4a1a6e">現地に見に行く</text>
      <text x="667" y="533" text-anchor="middle" font-size="12" fill="#4a1a6e">（商店街に人）</text>
      <line x1="726" y1="521" x2="760" y2="521" stroke="#e74c8b" stroke-width="2.5" marker-end="url(#arrow2)"/>
      <rect x="764" y="495" width="110" height="52" rx="26" fill="#fdeef5" stroke="#e74c8b"/>
      <text x="819" y="517" text-anchor="middle" font-size="12" fill="#4a1a6e">注目度で作品が</text>
      <text x="819" y="533" text-anchor="middle" font-size="12" fill="#4a1a6e">生き続ける</text>
      <path d="M 819 551 L 819 585 L 515 585 L 515 551" fill="none" stroke="#e74c8b" stroke-width="2.5" stroke-dasharray="7 4" marker-end="url(#arrow2)"/>
      <text x="667" y="605" text-anchor="middle" font-size="11" fill="#666">描き手のモチベーションへ還流</text>
    </g>

    <!-- 社会価値 -->
    <g>
      <text x="1040" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a1a6e">社会的価値</text>
      <text x="930" y="505" font-size="12" fill="#333">・落書きの合法的な受け皿</text>
      <text x="930" y="530" font-size="12" fill="#333">・シャッター商店街の</text>
      <text x="942" y="547" font-size="12" fill="#333">デジタルギャラリー化</text>
      <text x="930" y="572" font-size="12" fill="#333">・解体建物への寄せ書き</text>
      <text x="930" y="597" font-size="12" fill="#333">・AR観光による回遊創出</text>
    </g>
  </g>
</svg>
