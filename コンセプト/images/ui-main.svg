<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 950" font-family="'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <linearGradient id="scArt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e74c8b"/><stop offset="0.5" stop-color="#f39c12"/><stop offset="1" stop-color="#12c2e9"/>
    </linearGradient>
    <linearGradient id="scArt2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12c2e9"/><stop offset="1" stop-color="#27ae60"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="950" fill="#fbfaf7"/>
  <text x="600" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">PLATEAU Street Canvas — メイン画面UIラフ（3D都市ビュー）</text>

  <!-- ======== 画面フレーム ======== -->
  <rect x="30" y="70" width="1120" height="800" rx="10" fill="#ffffff" stroke="#444" stroke-width="2.5"/>

  <!-- トップバー -->
  <line x1="30" y1="126" x2="1150" y2="126" stroke="#444" stroke-width="1.5"/>
  <rect x="48" y="86" width="26" height="26" rx="6" fill="#e74c8b"/>
  <text x="86" y="105" font-size="15" font-weight="bold" fill="#333">PLATEAU Street Canvas</text>
  <!-- モードタブ -->
  <g>
    <rect x="330" y="82" width="130" height="34" rx="17" fill="#fdeef5" stroke="#e74c8b" stroke-width="2"/>
    <text x="395" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c8b">いまの街</text>
    <rect x="468" y="82" width="130" height="34" rx="17" fill="#fff" stroke="#bbb" stroke-width="1.5"/>
    <text x="533" y="104" text-anchor="middle" font-size="13" fill="#888">まちの地層</text>
    <circle cx="610" cy="86" r="12" fill="#e67e22"/>
    <text x="610" y="91" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">1</text>
  </g>
  <!-- エリア・検索・ユーザー -->
  <rect x="700" y="84" width="170" height="30" rx="15" fill="#fff" stroke="#bbb"/>
  <text x="716" y="104" font-size="12" fill="#555">📍 渋谷・宇田川町 ▼</text>
  <rect x="884" y="84" width="180" height="30" rx="15" fill="#f2f2f2" stroke="#ccc"/>
  <text x="900" y="104" font-size="12" fill="#999">作品・作者を検索…</text>
  <circle cx="1108" cy="99" r="15" fill="#ddd" stroke="#999"/>
  <text x="1108" y="104" text-anchor="middle" font-size="12" fill="#777">👤</text>

  <!-- ======== 左パネル ======== -->
  <line x1="270" y1="126" x2="270" y2="820" stroke="#444" stroke-width="1.5"/>
  <text x="48" y="156" font-size="14" font-weight="bold" fill="#333">キャンバスを探す</text>
  <!-- フィルタチップ -->
  <rect x="48" y="168" width="62" height="24" rx="12" fill="#eafaf0" stroke="#27ae60"/>
  <text x="79" y="184" text-anchor="middle" font-size="11" fill="#1e8449">空きあり</text>
  <rect x="116" y="168" width="62" height="24" rx="12" fill="#fdf1e3" stroke="#e67e22"/>
  <text x="147" y="184" text-anchor="middle" font-size="11" fill="#b9650f">上書き可</text>
  <rect x="184" y="168" width="50" height="24" rx="12" fill="#fdeef5" stroke="#e74c8b"/>
  <text x="209" y="184" text-anchor="middle" font-size="11" fill="#c2185b">人気</text>

  <!-- 凡例 -->
  <g>
    <rect x="48" y="210" width="200" height="98" rx="8" fill="#fafafa" stroke="#ccc"/>
    <text x="60" y="230" font-size="12" font-weight="bold" fill="#555">壁の状態（枠色）</text>
    <rect x="60" y="240" width="26" height="16" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="94" y="253" font-size="11" fill="#555">空きキャンバス</text>
    <rect x="60" y="262" width="26" height="16" fill="none" stroke="#e67e22" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="94" y="275" font-size="11" fill="#555">上書き可（退色間近）</text>
    <rect x="60" y="284" width="26" height="16" fill="none" stroke="#e74c8b" stroke-width="2.5"/>
    <text x="94" y="297" font-size="11" fill="#555">人気作品</text>
    <circle cx="236" cy="222" r="12" fill="#e67e22"/>
    <text x="236" y="227" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">2</text>
  </g>

  <!-- 注目TOP3 -->
  <text x="48" y="340" font-size="13" font-weight="bold" fill="#333">今週の注目 TOP3</text>
  <g>
    <rect x="48" y="352" width="200" height="54" rx="8" fill="#fff" stroke="#ddd"/>
    <rect x="56" y="360" width="56" height="38" rx="4" fill="url(#scArt)"/>
    <text x="122" y="374" font-size="12" font-weight="bold" fill="#333">クジラの夢</text>
    <text x="122" y="392" font-size="11" fill="#888">@kai ・ ♥ 1,240</text>
  </g>
  <g>
    <rect x="48" y="412" width="200" height="54" rx="8" fill="#fff" stroke="#ddd"/>
    <rect x="56" y="420" width="56" height="38" rx="4" fill="url(#scArt2)"/>
    <text x="122" y="434" font-size="12" font-weight="bold" fill="#333">夜のネオン</text>
    <text x="122" y="452" font-size="11" fill="#888">@mia ・ ♥ 980</text>
  </g>
  <g>
    <rect x="48" y="472" width="200" height="54" rx="8" fill="#fff" stroke="#ddd"/>
    <rect x="56" y="480" width="56" height="38" rx="4" fill="#c8b6e2"/>
    <text x="122" y="494" font-size="12" font-weight="bold" fill="#333">花のシャッター</text>
    <text x="122" y="512" font-size="11" fill="#888">@ren ・ ♥ 760</text>
  </g>
  <!-- 描くボタン -->
  <rect x="48" y="756" width="200" height="44" rx="22" fill="#e74c8b"/>
  <text x="148" y="783" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">＋ 描ける壁を探す</text>

  <!-- ======== 3Dビュー ======== -->
  <rect x="271" y="127" width="878" height="666" fill="#eaf3fb"/>
  <!-- 地面と道路 -->
  <polygon points="271,640 1149,600 1149,793 271,793" fill="#d8d8d2"/>
  <polygon points="560,793 660,600 780,600 1000,793" fill="#b8b8b0"/>
  <line x1="700" y1="770" x2="722" y2="700" stroke="#fff" stroke-width="4" stroke-dasharray="14 12"/>
  <line x1="730" y1="672" x2="742" y2="628" stroke="#fff" stroke-width="3" stroke-dasharray="10 9"/>

  <!-- 左ビル（人気作品） -->
  <g>
    <polygon points="330,300 330,650 540,680 540,330" fill="#cfd8e3" stroke="#9aa8b8"/>
    <polygon points="540,330 540,680 620,650 620,300" fill="#b7c3d2" stroke="#9aa8b8"/>
    <polygon points="330,300 540,330 620,300 410,272" fill="#e2e8f0" stroke="#9aa8b8"/>
    <!-- アート（鮮明） -->
    <g transform="translate(360 400)">
      <path d="M 20 160 Q 60 40 105 130 Q 140 60 170 150" fill="none" stroke="url(#scArt)" stroke-width="20" stroke-linecap="round"/>
      <circle cx="150" cy="55" r="20" fill="#f39c12"/>
    </g>
    <rect x="348" y="330" width="176" height="290" fill="none" stroke="#e74c8b" stroke-width="3.5"/>
    <rect x="348" y="306" width="70" height="24" fill="#e74c8b"/>
    <text x="383" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">人気</text>
  </g>

  <!-- 中央ビル（退色・選択中） -->
  <g>
    <polygon points="660,260 660,600 800,585 800,245" fill="#d8d2c8" stroke="#a8a094"/>
    <polygon points="800,245 800,585 860,600 860,260" fill="#c4bdb0" stroke="#a8a094"/>
    <polygon points="660,260 800,245 860,260 720,276" fill="#e8e3da" stroke="#a8a094"/>
    <!-- 退色アート -->
    <g transform="translate(676 330)" opacity="0.32">
      <path d="M 15 190 Q 40 60 75 150 Q 100 80 118 170" fill="none" stroke="url(#scArt2)" stroke-width="16" stroke-linecap="round"/>
    </g>
    <rect x="672" y="290" width="118" height="270" fill="none" stroke="#e67e22" stroke-width="3" stroke-dasharray="8 5"/>
    <rect x="672" y="266" width="92" height="24" fill="#e67e22"/>
    <text x="718" y="283" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">上書きOK</text>
  </g>

  <!-- 右ビル（空き） -->
  <g>
    <polygon points="920,320 920,610 1080,640 1080,350" fill="#d2dce6" stroke="#9aa8b8"/>
    <polygon points="1080,350 1080,640 1130,620 1130,332" fill="#bcc9d8" stroke="#9aa8b8"/>
    <polygon points="920,320 1080,350 1130,332 968,304" fill="#e2e8f0" stroke="#9aa8b8"/>
    <rect x="938" y="360" width="126" height="240" fill="none" stroke="#27ae60" stroke-width="3" stroke-dasharray="8 5"/>
    <rect x="938" y="336" width="58" height="24" fill="#27ae60"/>
    <text x="967" y="353" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">空き</text>
  </g>

  <!-- 作品カード（吹き出し） -->
  <g>
    <line x1="790" y1="420" x2="852" y2="392" stroke="#555" stroke-width="2"/>
    <rect x="852" y="270" width="250" height="250" rx="12" fill="#ffffff" stroke="#555" stroke-width="2"/>
    <rect x="852" y="270" width="250" height="56" rx="12" fill="#f6f2ec"/>
    <rect x="866" y="282" width="46" height="32" rx="4" fill="url(#scArt2)" opacity="0.5"/>
    <text x="924" y="296" font-size="14" font-weight="bold" fill="#333">クジラの夢</text>
    <text x="924" y="314" font-size="11" fill="#888">@kai ・ 3日前</text>
    <text x="868" y="352" font-size="12" fill="#555">注目度</text>
    <text x="980" y="352" font-size="13" font-weight="bold" fill="#333">1,240</text>
    <text x="868" y="382" font-size="12" fill="#555">インク量（生命力）</text>
    <rect x="868" y="392" width="218" height="12" rx="6" fill="#eee"/>
    <rect x="868" y="392" width="70" height="12" rx="6" fill="#e67e22"/>
    <text x="1094" y="402" text-anchor="end" font-size="11" font-weight="bold" fill="#e67e22">32%</text>
    <circle cx="1114" cy="386" r="12" fill="#e67e22"/>
    <text x="1114" y="391" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">3</text>
    <rect x="868" y="418" width="100" height="30" rx="15" fill="#fff" stroke="#e74c8b" stroke-width="1.5"/>
    <text x="918" y="438" text-anchor="middle" font-size="12" fill="#e74c8b">♥ いいね</text>
    <rect x="976" y="418" width="110" height="30" rx="15" fill="#fff" stroke="#2980b9" stroke-width="1.5"/>
    <text x="1031" y="438" text-anchor="middle" font-size="12" fill="#2980b9">ARで見に行く</text>
    <rect x="868" y="458" width="218" height="40" rx="20" fill="#e74c8b"/>
    <text x="977" y="483" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">この壁に描く</text>
    <circle cx="1104" cy="478" r="12" fill="#e67e22"/>
    <text x="1104" y="483" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">4</text>
  </g>

  <!-- ミニマップ -->
  <g>
    <rect x="1000" y="668" width="132" height="108" rx="8" fill="#ffffff" stroke="#555" stroke-width="1.5" opacity="0.95"/>
    <rect x="1012" y="680" width="26" height="20" fill="#dcd6cc"/>
    <rect x="1046" y="676" width="20" height="26" fill="#dcd6cc"/>
    <rect x="1076" y="684" width="30" height="18" fill="#dcd6cc"/>
    <rect x="1018" y="716" width="24" height="22" fill="#f7c8dd"/>
    <rect x="1052" y="712" width="28" height="24" fill="#f7c8dd"/>
    <rect x="1090" y="718" width="18" height="20" fill="#dcd6cc"/>
    <path d="M 1064 760 L 1052 736 L 1076 736 Z" fill="#2980b9" opacity="0.7"/>
    <circle cx="1064" cy="760" r="5" fill="#2980b9"/>
    <circle cx="1146" cy="682" r="12" fill="#e67e22"/>
    <text x="1146" y="687" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">5</text>
  </g>
  <!-- 操作ヒント -->
  <rect x="288" y="746" width="248" height="30" rx="15" fill="#ffffff" opacity="0.85" stroke="#ccc"/>
  <text x="412" y="766" text-anchor="middle" font-size="11" fill="#777">ドラッグ: 回転 ／ ホイール: ズーム ／ 右クリック: 移動</text>

  <!-- ======== 下部ステータスバー ======== -->
  <line x1="30" y1="820" x2="1150" y2="820" stroke="#444" stroke-width="1.5"/>
  <text x="290" y="850" font-size="13" fill="#555">🎨 生きている作品 <tspan font-weight="bold" fill="#333">34</tspan>　／　空きキャンバス <tspan font-weight="bold" fill="#27ae60">12</tspan>　／　今日の上書き <tspan font-weight="bold" fill="#e67e22">3</tspan></text>
  <rect x="880" y="830" width="250" height="32" rx="16" fill="#eaf3fb" stroke="#2980b9" stroke-width="1.5"/>
  <text x="1005" y="851" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">📱 徒歩3分に人気作品 → ARで見に行く</text>

  <!-- ======== 注記カラム ======== -->
  <g>
    <text x="1180" y="90" font-size="16" font-weight="bold" fill="#e67e22">UIラフ 注記</text>

    <rect x="1180" y="104" width="240" height="120" rx="10" fill="#fff7ef" stroke="#e67e22" stroke-width="1.5"/>
    <circle cx="1200" cy="124" r="12" fill="#e67e22"/>
    <text x="1200" y="129" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">1</text>
    <text x="1220" y="129" font-size="13" font-weight="bold" fill="#333">モード切替タブ</text>
    <text x="1194" y="152" font-size="11.5" fill="#555">「いまの街」＝退色・上書きが起きる</text>
    <text x="1194" y="169" font-size="11.5" fill="#555">生態系ビュー。「まちの地層」＝全履歴</text>
    <text x="1194" y="186" font-size="11.5" fill="#555">アーカイブ+タイムスライダー。</text>
    <text x="1194" y="203" font-size="11.5" fill="#555">ハイブリッド構造を1タップで行き来。</text>

    <rect x="1180" y="238" width="240" height="86" rx="10" fill="#fff7ef" stroke="#e67e22" stroke-width="1.5"/>
    <circle cx="1200" cy="258" r="12" fill="#e67e22"/>
    <text x="1200" y="263" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">2</text>
    <text x="1220" y="263" font-size="13" font-weight="bold" fill="#333">壁の状態は枠色で直感表示</text>
    <text x="1194" y="286" font-size="11.5" fill="#555">空き（緑）／上書き可（橙）／人気</text>
    <text x="1194" y="303" font-size="11.5" fill="#555">（ピンク）。描く場所探しが一目で。</text>

    <rect x="1180" y="338" width="240" height="120" rx="10" fill="#fff7ef" stroke="#e67e22" stroke-width="1.5"/>
    <circle cx="1200" cy="358" r="12" fill="#e67e22"/>
    <text x="1200" y="363" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">3</text>
    <text x="1220" y="363" font-size="13" font-weight="bold" fill="#333">作品カード</text>
    <text x="1194" y="386" font-size="11.5" fill="#555">インク量＝作品の生命力。時間で減り、</text>
    <text x="1194" y="403" font-size="11.5" fill="#555">注目されると回復。現地AR鑑賞の</text>
    <text x="1194" y="420" font-size="11.5" fill="#555">回復量が最大（×20）→「見に行く」</text>
    <text x="1194" y="437" font-size="11.5" fill="#555">動機を生み、人流をつくる。</text>

    <rect x="1180" y="472" width="240" height="86" rx="10" fill="#fff7ef" stroke="#e67e22" stroke-width="1.5"/>
    <circle cx="1200" cy="492" r="12" fill="#e67e22"/>
    <text x="1200" y="497" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">4</text>
    <text x="1220" y="497" font-size="13" font-weight="bold" fill="#333">「この壁に描く」</text>
    <text x="1194" y="520" font-size="11.5" fill="#555">壁面をUV展開した2Dペイント画面へ</text>
    <text x="1194" y="537" font-size="11.5" fill="#555">遷移（スプレー・レイヤー・AI仕上げ）。</text>

    <rect x="1180" y="572" width="240" height="86" rx="10" fill="#fff7ef" stroke="#e67e22" stroke-width="1.5"/>
    <circle cx="1200" cy="592" r="12" fill="#e67e22"/>
    <text x="1200" y="597" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">5</text>
    <text x="1220" y="597" font-size="13" font-weight="bold" fill="#333">ミニマップ</text>
    <text x="1194" y="620" font-size="11.5" fill="#555">作品の密集エリアをハイライトし、</text>
    <text x="1194" y="637" font-size="11.5" fill="#555">街の回遊・作品ハンティングを促す。</text>

    <rect x="1180" y="672" width="240" height="148" rx="10" fill="#f4f7fa" stroke="#8aa4bd" stroke-width="1.5"/>
    <text x="1194" y="696" font-size="13" font-weight="bold" fill="#33506b">画面遷移（このビューから）</text>
    <text x="1194" y="720" font-size="11.5" fill="#555">・壁選択 → 描画キャンバス画面</text>
    <text x="1194" y="740" font-size="11.5" fill="#555">・地層タブ → タイムスライダー画面</text>
    <text x="1194" y="760" font-size="11.5" fill="#555">・AR誘導 → スマホAR鑑賞</text>
    <text x="1194" y="780" font-size="11.5" fill="#555">・TOP3 → 作品詳細／作者ページ</text>
    <text x="1194" y="800" font-size="11.5" fill="#555">・検索 → 作品・エリア検索結果</text>
  </g>
</svg>
